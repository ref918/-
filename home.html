<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🏠 主頁</title>
<style>
.layout {
  display: flex;
}

.sidebar {
  width: 200px;
  height: 100vh;
  background: #222;
  color: white;
  padding: 20px;

  position: fixed;
  left: 0;
  top: 0;

  text-align: center;   /* ⭐ */
}

.sidebar a {
  display: block;
  margin: 10px auto;
  padding: 10px;

  width: 80%;
  border-radius: 8px;

  text-decoration: none;
  color: white;
  text-align: center;
}

.sidebar a:hover {
  background: #444;
}


.main {
  margin-left: 220px;
  padding: 20px;
}
.sidebar a.active {
  background: red;
}

.homeMain {
  margin-left: 220px;
  height: 100vh;
  width: calc(100vw - 220px);

  display: flex;              /* ⭐ 核心 */
  justify-content: center;   /* ✅ 水平置中 */
  align-items: center;       /* ✅ 垂直置中 */

  background: black;         /* ✅ 左右填滿 */
}

.mainImg {
  max-width: 100%;     /* ✅ 不超出寬 */
  max-height: 100%;    /* ✅ 不超出高 */
  object-fit: contain; /* ✅ 保持比例 */
}

/* ✅ 背景層（填滿整個右側） */
.bgLayer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("images/bg.jpg");
  background-size: cover;   /* ✅ 填滿 */
  background-position: center;

  filter: blur(40px);       /* ⭐ optional 軟化背景 */
  opacity: 0.5;
}

/* ✅ 主圖（完整顯示） */
.mainImg {
  position: relative;
  z-index: 2;

  max-width: 100%;
  max-height: 100%;

  display: block;
  margin: auto;             /* ✅ 置中 */

  object-fit: contain;      /* ✅ 完整顯示 */
}
</style>

<body>

<div class="layout">

  <!-- 左邊 -->
  <div class="sidebar">
    <h2>🎮 Menu</h2>
    <a href="home.html" class="active">🏠 主頁</a>
    <a href="index.html">⚔️ 對戰房間</a>
    <a href="player1.html">🎵 選歌房間</a>
    <a href="history.html">📜 比賽記錄</a>
    <a href="rule.html">📜 規則</a>
  </div>

<div class="homeMain">
  <img src="pic/鹹魚杯8th.jpg" class="mainImg">
</div>

</div>

</body>
